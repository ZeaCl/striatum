<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZEA Payments — Striatum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --zea-b1: #0a0a0b;
      --zea-b2: #141417;
      --zea-b3: #1a1a1f;
      --zea-bc: #e8e8ed;
      --zea-p: oklch(65% 0.18 260);
      --zea-er: oklch(55% 0.2 17);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Google Sans', ui-sans-serif, system-ui, sans-serif;
      background: var(--zea-b1);
      color: var(--zea-bc);
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes glow1 { 0%,100% { transform: translate(0,0) scale(1); opacity:0.5 } 50% { transform: translate(10px,-10px) scale(1.1); opacity:0.7 } }
    @keyframes glow2 { 0%,100% { transform: translate(0,0) scale(1); opacity:0.4 } 50% { transform: translate(-15px,-5px) scale(1.15); opacity:0.6 } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
